<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Нотаріус</title>
  <style>
    :root {
      --bg: #ffffff;
      --card: #ffffff;
      --text: #0B1F3A;
      --muted: #5F6B7A;
      --gold: #C8A951;
      --gold-hover: #B8963F;
      --border: #E8E8E8;
      --shadow: 0 10px 30px rgba(11, 31, 58, 0.08);
      --radius: 18px;
    }
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background:
        radial-gradient(circle at top, rgba(200, 169, 81, 0.10), transparent 28%),
        var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .wrap {
      width: 100%;
      max-width: 480px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: var(--shadow);
      padding: 32px 24px 24px;
      text-align: center;
    }
    .logo {
      width: 68px;
      height: 68px;
      margin: 0 auto 18px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: linear-gradient(145deg, #d8bb69, #b8963f);
      color: white;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }
    h1 {
      margin: 0;
      font-size: 30px;
      line-height: 1.15;
      color: var(--text);
    }
    .subtitle {
      margin: 10px 0 26px;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.5;
    }
    .divider {
      width: 64px;
      height: 3px;
      border-radius: 999px;
      background: var(--gold);
      margin: 0 auto 24px;
    }
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      min-height: 56px;
      padding: 14px 18px;
      margin: 12px 0;
      border-radius: var(--radius);
      text-decoration: none;
      font-weight: 700;
      font-size: 16px;
      transition: 0.2s ease;
      border: 1px solid transparent;
    }
    .btn-primary {
      background: var(--gold);
      color: #ffffff;
    }
    .btn-primary:hover {
      background: var(--gold-hover);
      transform: translateY(-1px);
    }
    .btn-secondary {
      background: #ffffff;
      color: var(--text);
      border-color: var(--border);
    }
    .btn-secondary:hover {
      border-color: var(--gold);
      transform: translateY(-1px);
    }
    .info {
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
      text-align: left;
    }
    .info-item {
      margin: 10px 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }
    .info-item strong {
      color: var(--text);
    }
    .footer {
      margin-top: 18px;
      color: #8A94A3;
      font-size: 12px;
      text-align: center;
    }
    @media (max-width: 480px) {
      .card {
        padding: 28px 18px 20px;
      }
      h1 {
        font-size: 26px;
      }
      .btn {
        font-size: 15px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">

      <h1>Приватний нотаріус Гаврилюк Марина Василівна</h1>
      <p class="subtitle">
        Луцький районний нотаріальний округ
      </p>

      <div class="divider"></div>

      <a class="btn btn-primary" href="https://g.page/r/CT0ERkIqIaYTEAI/review" target="_blank" rel="noopener noreferrer">
        ⭐ Залишити відгук
      </a>

      <a class="btn btn-secondary" href="tel:+380506635601">
        📞 Подзвонити
      </a>

        <a class="btn btn-secondary" href="viber://chat?number=%2B380506635601" target="_blank" rel="noopener noreferrer">
            💬 Viber
        </a>


      <div class="info">
        <div class="info-item"><strong>Адреса:</strong> Проспект Відродження, 16, Луцьк, 43000 </div>
        <div class="info-item"><strong>Години роботи:</strong> Пн–Пт, 09:00–18:00</div>
      </div>
    </div>

    <div class="footer">
      © 2026 Приватний нотаріус Гаврилюк Марина Василівна
    </div>
  </div>
</body>
</html>
